name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Java 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Confirm tag and project version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          POM_VERSION="$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)"
          test "$VERSION" = "$POM_VERSION"
          test -f "docs/RELEASE_NOTES_${VERSION}.md"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
      - name: Build and package
        shell: pwsh
        run: ./scripts/package-release.ps1
      - name: Verify release package
        shell: pwsh
        run: ./scripts/verify-release.ps1
      - name: Attest build provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: |
            dist/*.zip
            dist/*.tar.gz
            dist/*.cdx.json
            dist/release-manifest.json
      - name: Attest release SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: |
            dist/*.zip
            dist/*.tar.gz
          sbom-path: dist/code-atlas-${{ env.VERSION }}.cdx.json
      - name: Publish versioned release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" dist/* \
            --verify-tag \
            --title "Code Atlas ${VERSION}" \
            --notes-file "docs/RELEASE_NOTES_${VERSION}.md"
